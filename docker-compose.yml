services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investment-journal-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: investment_journal
      DB_USERNAME: investment_user
      DB_PASSWORD: investment_pass

  vite:
    image: node:20
    container_name: investment-journal-vite
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

  mysql:
    image: mysql:8.0
    container_name: investment-journal-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: investment_journal
      MYSQL_USER: investment_user
      MYSQL_PASSWORD: investment_pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: investment-journal-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  mysql_data:
